<!DOCTYPE html>
<html lang="th">
<body>

<ul id="menu">
  <li>ข้าวผัด</li>
  <li>ผัดไทย</li>
  <li>ต้มยำกุ้ง</li>
</ul>
<p id="result">ยังไม่ได้เลือก</p>

<script>
const menu = document.getElementById("menu");
const result = document.getElementById("result");

// ผูกที่ ul ตัวเดียว คลิก li ตัวไหนก็รู้หมด
menu.addEventListener("click", function(event) {
  if (event.target.tagName === "LI") {
    result.textContent = "คุณเลือก: " + event.target.textContent;
  }
});

// พิสูจน์ว่า li ที่สร้างใหม่ก็คลิกได้เลย ไม่ต้องผูก event เพิ่ม
const newLi = document.createElement("li");
newLi.textContent = "ส้มตำ (เพิ่มทีหลัง)";
menu.appendChild(newLi);
</script>

</body>
</html>
