<!DOCTYPE html>
<html lang="th">
<body>

<h2 id="hoverMe">เอาเมาส์มาชี้ฉันสิ</h2>
<input type="text" id="liveInput" placeholder="พิมพ์เพื่อดู event: input" />
<p id="counter">0 ตัวอักษร</p>

<script>
// mouseover / mouseout
const h = document.getElementById("hoverMe");
h.addEventListener("mouseover", () => h.style.color = "crimson");
h.addEventListener("mouseout",  () => h.style.color = "black");

// input: ทำงานทุกครั้งที่ตัวอักษรเปลี่ยน
const box = document.getElementById("liveInput");
const counter = document.getElementById("counter");
box.addEventListener("input", (e) => {
  counter.textContent = `${e.target.value.length} ตัวอักษร`;
});

// DOMContentLoaded: รันเมื่อ DOM พร้อม
document.addEventListener("DOMContentLoaded", () => {
  console.log("DOM พร้อมใช้งานแล้ว!");
});
</script>

</body>
</html>
